<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quote PDF — PRINTplus MIS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222}
.topbar{background:#1a3a5c;color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.topbar h1{font-size:1.1rem;font-weight:700}
.topbar .actions{display:flex;gap:10px;align-items:center}
.btn{padding:8px 18px;border:none;border-radius:7px;font-size:.85rem;font-weight:600;cursor:pointer}
.btn-primary{background:#1a3a5c;color:#fff}
.btn-success{background:#27ae60;color:#fff}
.btn-outline{background:#fff;color:#1a3a5c;border:2px solid #1a3a5c}
.status-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:.75rem;font-weight:700;text-transform:uppercase}
.status-Draft{background:#f0f4f8;color:#555}
.status-Sent{background:#dbeafe;color:#1e40af}
.status-Accepted{background:#d1fae5;color:#065f46}
.status-Rejected{background:#fee2e2;color:#991b1b}
.status-Expired{background:#fef3c7;color:#92400e}
.status-sel{padding:5px 10px;border:1.5px solid #dde3ea;border-radius:7px;font-size:.83rem;background:#fff;cursor:pointer}

/* Wrapper for PDF content */
.pdf-wrapper{max-width:860px;margin:24px auto;background:#fff;border-radius:10px;box-shadow:0 4px 20px #0002;overflow:hidden}

/* PDF Header */
.pdf-header{background:#1a3a5c;color:#fff;padding:28px 36px;display:flex;justify-content:space-between;align-items:flex-start;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.company-block .company-name{font-size:1.6rem;font-weight:800;letter-spacing:.5px}
.company-block .company-tag{font-size:.82rem;opacity:.8;margin-top:3px}
.company-block .company-contact{font-size:.78rem;opacity:.7;margin-top:10px;line-height:1.7}
.quote-meta{text-align:right}
.quote-meta .quote-no{font-size:1.4rem;font-weight:800;letter-spacing:1px}
.quote-meta .quote-label{font-size:.72rem;opacity:.7;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.quote-meta .meta-row{font-size:.78rem;opacity:.8;margin-top:4px}

/* Body */
.pdf-body{padding:28px 36px}

/* Customer & Job section */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.info-card{border:1.5px solid #e0e8f0;border-radius:8px;padding:14px}
.info-card .ic-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#4da6ff;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid #e8eef4}
.info-card .ic-row{font-size:.83rem;color:#444;margin:4px 0;line-height:1.5}
.info-card .ic-row strong{color:#1a3a5c}

/* Job spec box */
.spec-box{background:#f7f9fc;border:1.5px solid #e0e8f0;border-radius:8px;padding:16px;margin-bottom:24px}
.spec-box .spec-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#4da6ff;margin-bottom:10px}
.spec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.spec-item{font-size:.82rem}
.spec-item .sl{color:#888;font-size:.72rem;display:block;margin-bottom:1px}
.spec-item .sv{color:#1a3a5c;font-weight:600}

/* Pricing table */
.pricing-section{margin-bottom:24px}
.pricing-section h3{font-size:.85rem;font-weight:700;color:#1a3a5c;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e8eef4;padding-bottom:8px}
.pricing-table{width:100%;border-collapse:collapse}
.pricing-table th{background:#1a3a5c;color:#fff;padding:10px 14px;font-size:.78rem;text-align:center;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pricing-table th:first-child{text-align:left}
.pricing-table td{padding:8px 14px;font-size:.85rem;border-bottom:1px solid #f0f2f5;text-align:center;vertical-align:middle}
.pricing-table td:first-child{text-align:left;font-weight:600;color:#1a3a5c}
.pricing-table .total-row td{background:#f0f4f8;font-weight:700;font-size:.95rem;border-top:2px solid #1a3a5c;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.pricing-table .cpp-row td{background:#eafaf1;font-size:.82rem;color:#1e8449;font-weight:600;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.highlight-col{background:#fff8e1!important}
.pricing-table .subheader-row td{background:#e8eef4;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#555;padding:5px 14px;print-color-adjust:exact;-webkit-print-color-adjust:exact}

/* Notes box */
.notes-box{background:#fffbe6;border-left:4px solid #f1c40f;padding:12px 16px;border-radius:0 8px 8px 0;margin-bottom:20px;font-size:.83rem;color:#444;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.notes-box .nb-title{font-weight:700;color:#856404;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* Terms */
.terms-box{border:1.5px solid #e0e8f0;border-radius:8px;padding:14px;margin-bottom:20px}
.terms-box .t-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#4da6ff;margin-bottom:8px}
.terms-box ul{padding-left:16px}
.terms-box ul li{font-size:.78rem;color:#666;margin:3px 0;line-height:1.5}

/* Footer */
.pdf-footer{background:#f7f9fc;border-top:2px solid #e0e8f0;padding:16px 36px;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:#888}
.pdf-footer .footer-brand{font-weight:700;color:#1a3a5c}

/* Validity strip */
.validity-strip{background:#1a3a5c;color:#fff;text-align:center;padding:8px;font-size:.8rem;font-weight:600;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.validity-strip span{background:#4da6ff;border-radius:4px;padding:2px 10px;margin-left:6px}

/* Breakdown accordion */
.breakdown-section{margin-top:24px;border-top:2px dashed #e0e8f0;padding-top:20px}
.breakdown-section h3{font-size:.85rem;font-weight:700;color:#1a3a5c;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.bd-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:.8rem}
.bd-table th{background:#f0f4f8;padding:6px 10px;text-align:left;color:#555;font-size:.72rem}
.bd-table td{padding:4px 8px;border-bottom:1px solid #f0f2f5;color:#444}
.bd-table .sec-row td{background:#e8eef4;font-weight:700;font-size:.72rem;text-transform:uppercase;color:#1a3a5c;padding:4px 8px;letter-spacing:.4px}
.bd-table .sub-row td{padding-left:16px;color:#888;font-style:italic}
.bd-table .total-row td{font-weight:700;color:#1a3a5c;border-top:2px solid #dde3ea;background:#f7f9fc}
.bd-qty-title{font-size:.8rem;font-weight:700;color:#1a3a5c;margin-bottom:6px;padding:6px 10px;background:#dbeafe;border-radius:6px;display:inline-block}

/* Screen-only */
.screen-only{} 

@media print{
  body{background:#fff}
  .topbar,.screen-only{display:none!important}
  .pdf-wrapper{margin:0;border-radius:0;box-shadow:none;max-width:100%}
  .breakdown-section{page-break-before:always}
  @page{margin:12mm 10mm}
}
</style>
</head>
<body>
<div class="topbar screen-only">
  <h1>PRINTplus MIS — Quote Preview</h1>
  <div class="actions">
    <select class="status-sel" id="status-sel" onchange="updateStatus()">
      <option value="Draft">Draft</option>
      <option value="Sent">Sent</option>
      <option value="Accepted">Accepted</option>
      <option value="Rejected">Rejected</option>
      <option value="Expired">Expired</option>
    </select>
    <button class="btn btn-outline" onclick="window.print()">🖨️ Print / Save PDF</button>
    <button class="btn btn-primary" onclick="window.location.href='/quote-form.html?id='+quoteId">✏️ Edit Quote</button>
    <button class="btn btn-outline" onclick="window.location.href='/quotes.html'">← Back</button>
  </div>
</div>

<div class="pdf-wrapper" id="pdf-wrapper">
  <!-- Filled by JS -->
</div>

<script>
const token = localStorage.getItem('mis_token');
const user = JSON.parse(localStorage.getItem('mis_user')||'null');
if(!token||!user){ window.location.href='/index.html'; }

const urlParams = new URLSearchParams(window.location.search);
const quoteId = urlParams.get('id');
if(!quoteId){ document.body.innerHTML='<p style="padding:40px;color:red">No quote ID specified.</p>'; }

let quoteData = null;
let companySettings = {};

async function init(){
  try {
    // Load settings
    const sr = await fetch('/api/settings', {headers:{'Authorization':`Bearer ${token}`}});
    if(sr.ok) companySettings = await sr.json();
  } catch(e){}

  const res = await fetch(`/api/quotes/${quoteId}`, {headers:{'Authorization':`Bearer ${token}`}});
  if(!res.ok){ document.getElementById('pdf-wrapper').innerHTML='<p style="padding:40px;color:red">Quote not found.</p>'; return; }
  quoteData = await res.json();

  // Set status selector
  document.getElementById('status-sel').value = quoteData.status || 'Draft';

  renderPDF();
}

function fmtCurrency(n){
  return '₹' + (parseFloat(n)||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtQty(n){
  return (parseInt(n)||0).toLocaleString('en-IN');
}
function fmtDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}

function renderPDF(){
  const q = quoteData;
  const s = q.specs || {};
  const co = companySettings;

  const companyName = co.company_name || 'Mou Press';
  const companyTag = co.company_tagline || 'Quality Printing Solutions';
  const companyAddr = co.address || '';
  const companyPhone = co.phone || '';
  const companyEmail = co.email || '';
  const companyGST = co.gst_number || '';
  const companyWeb = co.website || '';

  const custName = q.customer_name || q.cash_customer_name || 'Walk-in Customer';
  const custId = q.cust_code || '';
  const custPhone = q.cust_phone || s.cashPhone || '';
  const custEmail = q.cust_email || s.cashEmail || '';
  const custAddr = q.cust_address || '';

  const jobDesc = s.jobDesc || q.job_type || '—';
  const jobType = q.job_type || '—';
  const method = q.print_method || '—';
  const orientation = s.orientation || '—';
  const finW = s.finW || '—';
  const finH = s.finH || '—';
  const colours = s.colours || '4';
  const binding = s.binding || 'None';
  const insidePages = s.insidePages || '';
  const impMethod = s.impMethod || 'Auto';

  // Build quantities
  const qtys = [
    {n:1, qty:q.qty1, total:q.total1},
    {n:2, qty:q.qty2, total:q.total2},
    {n:3, qty:q.qty3, total:q.total3}
  ].filter(x=>x.qty>0);

  // Status badge
  const statusColors = {
    Draft:'#f0f4f8;color:#555',
    Sent:'#dbeafe;color:#1e40af',
    Accepted:'#d1fae5;color:#065f46',
    Rejected:'#fee2e2;color:#991b1b',
    Expired:'#fef3c7;color:#92400e'
  };
  const sc = statusColors[q.status] || statusColors.Draft;

  // Build pricing table columns
  let thCols = qtys.map(x=>`<th style="min-width:130px">Qty ${fmtQty(x.qty)}</th>`).join('');
  let totalCols = qtys.map((x,i)=>`<td style="color:#1a78c2;font-size:1.05rem">${fmtCurrency(x.total)}</td>`).join('');
  let cppCols = qtys.map(x=>`<td>${fmtCurrency((x.total/x.qty))}/copy</td>`).join('');

  // Build spec grid
  const specItems = [
    ['Job Type', jobType],
    ['Print Method', method],
    ['Finished Size', `${finW} × ${finH}`],
    ['Orientation', orientation],
    ['Colours', colours + ' Colour' + (parseInt(colours)>1?'s':'')],
    ['Binding', binding || 'None'],
  ];
  if(insidePages) specItems.push(['Inside Pages', insidePages + 'pp']);
  if(s.lamTypeId) specItems.push(['Lamination', 'Yes']);
  if(s.uvTypeId) specItems.push(['UV Coating', 'Yes']);

  const specHtml = specItems.map(([l,v])=>`
    <div class="spec-item">
      <span class="sl">${l}</span>
      <span class="sv">${v}</span>
    </div>`).join('');

  // Breakdown tables (internal — shown at bottom, not on customer copy)
  let breakdownHtml = '';
  const bd = (typeof q.breakdown === 'object') ? q.breakdown : {};
  qtys.forEach((x,i)=>{
    const rows = bd[`qty${x.n}`] || [];
    if(!rows.length) return;
    breakdownHtml += `<div class="bd-qty-title">Qty ${fmtQty(x.qty)} — ${fmtCurrency(x.total)}</div>
    <table class="bd-table">
      <thead><tr><th>Description</th><th style="text-align:right">Amount (₹)</th></tr></thead>
      <tbody>
        ${rows.map(r=>{
          if(r.section) return `<tr class="sec-row"><td colspan="2">${r.label}</td></tr>`;
          if(r.sub) return `<tr class="sub-row"><td colspan="2">${r.label}</td></tr>`;
          return `<tr><td>${r.label}</td><td style="text-align:right">${fmtCurrency(r.amt)}</td></tr>`;
        }).join('')}
        <tr class="total-row">
          <td>TOTAL — Qty ${fmtQty(x.qty)}</td>
          <td style="text-align:right">${fmtCurrency(x.total)}</td>
        </tr>
      </tbody>
    </table>`;
  });

  const jobNotesHtml = s.jobNotes ? `
    <div class="notes-box">
      <div class="nb-title">📝 Special Instructions</div>
      ${s.jobNotes}
    </div>` : '';

  const termsHtml = (co.terms || '') ?
    `<div class="terms-box">
      <div class="t-title">Terms &amp; Conditions</div>
      <ul>${(co.terms||'').split('\n').filter(Boolean).map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>` :
    `<div class="terms-box">
      <div class="t-title">Terms &amp; Conditions</div>
      <ul>
        <li>Prices are valid for the period stated on this quote.</li>
        <li>50% advance payment required to commence production.</li>
        <li>Balance due on delivery / dispatch.</li>
        <li>Colours may vary slightly due to the nature of the printing process.</li>
        <li>Customer is responsible for approval of supplied artwork/proofs.</li>
        <li>Prices exclude GST unless otherwise stated.</li>
      </ul>
    </div>`;

  const gstLine = companyGST ? `<div class="ic-row"><strong>GST:</strong> ${companyGST}</div>` : '';
  const webLine = companyWeb ? `<div class="ic-row"><strong>Web:</strong> ${companyWeb}</div>` : '';

  document.getElementById('pdf-wrapper').innerHTML = `
    <div class="pdf-header">
      <div class="company-block">
        <div class="company-name">🖨️ ${companyName}</div>
        <div class="company-tag">${companyTag}</div>
        <div class="company-contact">
          ${companyAddr ? companyAddr + '<br>' : ''}
          ${companyPhone ? '📞 ' + companyPhone + '&nbsp;&nbsp;' : ''}
          ${companyEmail ? '📧 ' + companyEmail : ''}
          ${companyGST ? '<br>GST: ' + companyGST : ''}
        </div>
      </div>
      <div class="quote-meta">
        <div class="quote-label">Quotation</div>
        <div class="quote-no">${q.quote_no}</div>
        <div class="meta-row">📅 Date: ${fmtDate(q.created_at)}</div>
        <div class="meta-row">⏳ Valid until: ${fmtDate(q.expiry_date)}</div>
        <div class="meta-row" style="margin-top:8px">
          <span style="background:${sc.split(';')[0].replace('background:','')};color:${sc.split(';')[1]?.replace('color:','')};padding:3px 12px;border-radius:12px;font-size:.75rem;font-weight:700;text-transform:uppercase">
            ${q.status}
          </span>
        </div>
      </div>
    </div>

    <div class="pdf-body">

      <div class="info-grid">
        <div class="info-card">
          <div class="ic-title">👥 Prepared For</div>
          <div class="ic-row" style="font-size:.95rem;font-weight:700;color:#1a3a5c">${custName}</div>
          ${custId ? `<div class="ic-row"><strong>ID:</strong> ${custId}</div>` : ''}
          ${custPhone ? `<div class="ic-row">📞 ${custPhone}</div>` : ''}
          ${custEmail ? `<div class="ic-row">📧 ${custEmail}</div>` : ''}
          ${custAddr ? `<div class="ic-row">📍 ${custAddr}</div>` : ''}
        </div>
        <div class="info-card">
          <div class="ic-title">📋 Job Details</div>
          <div class="ic-row" style="font-size:.92rem;font-weight:700;color:#1a3a5c">${jobDesc}</div>
          <div class="ic-row"><strong>Type:</strong> ${jobType}</div>
          <div class="ic-row"><strong>Method:</strong> ${method}</div>
          ${q.notes ? `<div class="ic-row" style="color:#888;font-size:.78rem;margin-top:6px">Note: ${q.notes}</div>` : ''}
        </div>
      </div>

      <div class="spec-box">
        <div class="spec-title">🔧 Job Specifications</div>
        <div class="spec-grid">${specHtml}</div>
      </div>

      <div class="pricing-section">
        <h3>💰 Pricing Comparison</h3>
        <table class="pricing-table">
          <thead>
            <tr>
              <th style="text-align:left">Description</th>
              ${thCols}
            </tr>
          </thead>
          <tbody>
            <tr class="subheader-row">
              <td colspan="${qtys.length+1}">Finished Printed &amp; Completed — ${jobDesc}</td>
            </tr>
            <tr>
              <td>Quantity</td>
              ${qtys.map(x=>`<td>${fmtQty(x.qty)} copies</td>`).join('')}
            </tr>
            <tr>
              <td>Finished Size</td>
              ${qtys.map(()=>`<td>${finW} × ${finH}</td>`).join('')}
            </tr>
            <tr>
              <td>Print Colours</td>
              ${qtys.map(()=>`<td>${colours} Colour${parseInt(colours)>1?'s':''}</td>`).join('')}
            </tr>
            ${binding && binding !== 'None' ? `<tr>
              <td>Binding</td>
              ${qtys.map(()=>`<td>${binding}</td>`).join('')}
            </tr>` : ''}
            ${s.lamTypeId ? `<tr>
              <td>Lamination</td>
              ${qtys.map(()=>`<td>Included</td>`).join('')}
            </tr>` : ''}
            ${s.uvTypeId ? `<tr>
              <td>UV Coating</td>
              ${qtys.map(()=>`<td>Included</td>`).join('')}
            </tr>` : ''}
            <tr class="total-row">
              <td>TOTAL PRICE (excl. GST)</td>
              ${totalCols}
            </tr>
            <tr class="cpp-row">
              <td>Cost per Copy</td>
              ${cppCols}
            </tr>
          </tbody>
        </table>
      </div>

      ${jobNotesHtml}
      ${termsHtml}

      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:28px;padding-top:16px;border-top:1.5px solid #e0e8f0">
        <div style="font-size:.8rem;color:#888">
          <div>Prepared by: <strong>${user?.full_name || user?.username || '—'}</strong></div>
          <div>PRINTplus MIS — ${companyName}</div>
        </div>
        <div style="text-align:right">
          <div style="height:40px;border-bottom:1.5px solid #555;width:180px;margin-bottom:4px"></div>
          <div style="font-size:.75rem;color:#888">Authorised Signature</div>
        </div>
      </div>
    </div>

    <div class="validity-strip">
      This quote is valid until <span>${fmtDate(q.expiry_date)}</span>. Prices exclude GST.
    </div>

    <div class="pdf-footer">
      <div><span class="footer-brand">${companyName}</span>${companyGST ? ' &nbsp;|&nbsp; GST: ' + companyGST : ''}</div>
      <div>PRINTplus MIS &nbsp;|&nbsp; Quote ${q.quote_no}</div>
    </div>

    ${breakdownHtml ? `
    <div class="pdf-body breakdown-section screen-only">
      <h3>📊 Internal Cost Breakdown (not printed on customer copy)</h3>
      ${breakdownHtml}
    </div>` : ''}
  `;
}

async function updateStatus(){
  const newStatus = document.getElementById('status-sel').value;
  const res = await fetch(`/api/quotes/${quoteId}/status`, {
    method:'PUT',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
    body: JSON.stringify({status: newStatus})
  });
  if(res.ok){
    quoteData.status = newStatus;
    renderPDF();
    // Show brief confirmation
    const btn = document.getElementById('status-sel');
    const orig = btn.style.border;
    btn.style.border = '2px solid #27ae60';
    setTimeout(()=>btn.style.border=orig, 1200);
  }
}

init();
</script>
</body>
</html>
